<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEAD RUN — Zombie Escape</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blood: #ff2020;
    --acid: #39ff14;
    --void: #0a0a0f;
    --deep: #0f0f1a;
    --panel: #12121f;
    --mist: #1a1a2e;
    --gold: #ffd700;
    --cyan: #00ffe1;
    --ghost: rgba(255,255,255,0.05);
    --glow-red: 0 0 12px #ff2020, 0 0 30px #ff202066;
    --glow-acid: 0 0 12px #39ff14, 0 0 30px #39ff1466;
    --glow-cyan: 0 0 12px #00ffe1, 0 0 30px #00ffe166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rubik', sans-serif;
    background: var(--void);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated fog background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255,20,20,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(57,255,20,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 50% 50%, rgba(0,0,20,0.8) 0%, transparent 100%);
    animation: fogShift 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 100;
  }

  @keyframes fogShift {
    0% { opacity: 0.7; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* TITLE */
  .title-wrap {
    text-align: center;
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    letter-spacing: 6px;
    color: var(--blood);
    text-shadow: 0 0 20px #ff2020, 0 0 60px #ff202055, 0 0 2px #fff;
    animation: titlePulse 2.5s ease-in-out infinite;
    line-height: 1;
  }

  .tagline {
    font-size: 0.75rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px #ff2020, 0 0 60px #ff202055, 0 0 2px #fff; }
    50% { text-shadow: 0 0 40px #ff2020, 0 0 90px #ff2020aa, 0 0 4px #fff; }
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid rgba(255,32,32,0.2);
    border-radius: 10px;
    padding: 10px 18px;
    margin-bottom: 16px;
    font-size: 0.78rem;
    letter-spacing: 1px;
  }

  .status-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .status-label {
    color: rgba(255,255,255,0.3);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .status-value {
    color: var(--acid);
    font-weight: 700;
    font-size: 1rem;
    text-shadow: var(--glow-acid);
    transition: all 0.3s;
  }

  .status-value.danger { color: var(--blood); text-shadow: var(--glow-red); }
  .status-value.info { color: var(--cyan); text-shadow: var(--glow-cyan); }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }

  .tool-btn {
    position: relative;
    background: var(--panel);
    border: 1.5px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    padding: 9px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    overflow: hidden;
  }

  .tool-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
  }

  .tool-btn:hover {
    transform: translateY(-2px) scale(1.05);
    color: white;
    border-color: rgba(255,255,255,0.25);
  }

  .tool-btn:active { transform: scale(0.96); }

  .tool-btn.active {
    transform: translateY(-2px);
    color: white;
  }

  /* Color variants */
  .tool-btn.t-start { --tc: #2ecc71; }
  .tool-btn.t-exit  { --tc: #00ffe1; }
  .tool-btn.t-zombie{ --tc: var(--blood); }
  .tool-btn.t-wall  { --tc: #555; }
  .tool-btn.t-clear { --tc: #aaa; }

  .tool-btn.active,
  .tool-btn.t-start:hover  { border-color: #2ecc71; box-shadow: 0 0 12px #2ecc7155; color: #2ecc71; }
  .tool-btn.t-exit:hover   { border-color: #00ffe1; box-shadow: 0 0 12px #00ffe155; color: #00ffe1; }
  .tool-btn.t-zombie:hover { border-color: var(--blood); box-shadow: var(--glow-red); color: var(--blood); }
  .tool-btn.t-wall:hover   { border-color: #666; box-shadow: 0 0 12px #55555555; color: #aaa; }
  .tool-btn.t-clear:hover  { border-color: #888; color: white; }

  .tool-btn.active.t-start  { border-color: #2ecc71; background: rgba(46,204,113,0.12); color: #2ecc71; box-shadow: 0 0 16px #2ecc7155; }
  .tool-btn.active.t-exit   { border-color: #00ffe1; background: rgba(0,255,225,0.12); color: #00ffe1; box-shadow: 0 0 16px #00ffe155; }
  .tool-btn.active.t-zombie { border-color: var(--blood); background: rgba(255,32,32,0.12); color: var(--blood); box-shadow: var(--glow-red); }
  .tool-btn.active.t-wall   { border-color: #666; background: rgba(80,80,80,0.2); color: #bbb; }
  .tool-btn.active.t-clear  { border-color: #999; background: rgba(150,150,150,0.1); color: white; }

  /* ACTION BUTTONS */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .action-btn {
    background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: white;
    padding: 11px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Rubik', sans-serif;
    font-weight: 900;
    font-size: 0.82rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
  }

  .action-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.05));
  }

  .action-btn.bfs-btn {
    border-color: var(--acid);
    color: var(--acid);
    box-shadow: 0 0 8px #39ff1433;
  }

  .action-btn.bfs-btn:hover {
    background: rgba(57,255,20,0.12);
    box-shadow: var(--glow-acid);
    transform: translateY(-3px) scale(1.04);
  }

  .action-btn.astar-btn {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 8px #ffd70033;
  }

  .action-btn.astar-btn:hover {
    background: rgba(255,215,0,0.1);
    box-shadow: 0 0 16px #ffd700aa;
    transform: translateY(-3px) scale(1.04);
  }

  .action-btn.reset-btn {
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
  }

  .action-btn.reset-btn:hover {
    border-color: var(--blood);
    color: var(--blood);
    box-shadow: var(--glow-red);
    transform: translateY(-3px) scale(1.04);
  }

  .action-btn:active { transform: scale(0.95) !important; }

  /* GRID WRAPPER */
  .grid-wrap {
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255,32,32,0.15);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 0 40px rgba(255,32,32,0.08), inset 0 0 30px rgba(0,0,0,0.5);
  }

  .grid-corner {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--blood);
    border-style: solid;
    opacity: 0.6;
  }
  .grid-corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
  .grid-corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .grid-corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
  .grid-corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
  }

  /* CELL */
  .cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(14px, 2.5vw, 20px);
    cursor: pointer;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .cell:hover { transform: scale(1.12); z-index: 2; }
  .cell:active { transform: scale(0.9); }

  /* Cell pulse ring on hover */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: inset 0 0 6px rgba(255,255,255,0.3);
  }
  .cell:hover::after { opacity: 1; }

  .cell.empty {
    background: linear-gradient(145deg, #1c1c2e, #14141f);
    border: 1px solid rgba(255,255,255,0.04);
  }

  .cell.wall {
    background: linear-gradient(145deg, #111, #0a0a0a);
    border: 1px solid rgba(255,255,255,0.02);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
  }

  .cell.start {
    background: linear-gradient(145deg, #1a6b3a, #0f4a27);
    border: 1.5px solid #2ecc71;
    box-shadow: 0 0 12px #2ecc7166, inset 0 0 10px rgba(46,204,113,0.15);
    animation: startPulse 2s ease-in-out infinite;
  }

  .cell.exit {
    background: linear-gradient(145deg, #004d66, #002233);
    border: 1.5px solid var(--cyan);
    box-shadow: 0 0 14px #00ffe166, inset 0 0 10px rgba(0,255,225,0.1);
    animation: exitPulse 1.8s ease-in-out infinite;
  }

  .cell.zombie {
    background: linear-gradient(145deg, #6b0000, #3d0000);
    border: 1.5px solid var(--blood);
    box-shadow: var(--glow-red), inset 0 0 10px rgba(255,32,32,0.2);
    animation: zombiePulse 1s ease-in-out infinite;
  }

  .cell.path {
    background: linear-gradient(145deg, #003d2e, #002018);
    border: 1.5px solid var(--acid);
    box-shadow: 0 0 10px #39ff1455;
    animation: pathReveal 0.4s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  .cell.current {
    background: linear-gradient(145deg, #3a3a00, #1f1f00);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 18px #ffd700aa;
    animation: walkerGlow 0.4s ease-in-out infinite alternate;
    z-index: 3;
  }

  .cell.no-path {
    animation: noPathFlash 0.5s ease-in-out 3;
    background: rgba(255,32,32,0.2) !important;
    border-color: var(--blood) !important;
  }

  @keyframes startPulse {
    0%,100% { box-shadow: 0 0 8px #2ecc7166; }
    50% { box-shadow: 0 0 18px #2ecc71aa; }
  }
  @keyframes exitPulse {
    0%,100% { box-shadow: 0 0 8px #00ffe166; }
    50% { box-shadow: 0 0 20px #00ffe1bb; }
  }
  @keyframes zombiePulse {
    0%,100% { box-shadow: 0 0 10px #ff202066; transform: scale(1); }
    50% { box-shadow: 0 0 20px #ff2020cc; transform: scale(1.04); }
  }
  @keyframes pathReveal {
    0% { opacity: 0; transform: scale(0.4); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes walkerGlow {
    0% { box-shadow: 0 0 14px #ffd700aa; }
    100% { box-shadow: 0 0 28px #ffd700ff, 0 0 6px #fff; }
  }
  @keyframes noPathFlash {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MESSAGE TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: white;
    padding: 14px 28px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.4s;
    opacity: 0;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success { border-color: var(--acid); color: var(--acid); box-shadow: var(--glow-acid); }
  .toast.error   { border-color: var(--blood); color: var(--blood); box-shadow: var(--glow-red); }
  .toast.info    { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px #ffd700aa; }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* PARTICLE CANVAS */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="title-wrap">
    <h1>💀 DEAD RUN</h1>
    <div class="tagline">Zombie Escape Pathfinder</div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">Algorithm</span>
      <span class="status-value info" id="stat-algo">—</span>
    </div>
    <div class="status-item">
      <span class="status-label">Path Length</span>
      <span class="status-value" id="stat-length">—</span>
    </div>
    <div class="status-item">
      <span class="status-label">Zombies</span>
      <span class="status-value danger" id="stat-zombies">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">Walls</span>
      <span class="status-value" id="stat-walls">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">Status</span>
      <span class="status-value" id="stat-status">READY</span>
    </div>
  </div>

  <div class="toolbar">
    <button class="tool-btn t-start" onclick="setMode('start')" id="btn-start">🧍 SURVIVOR</button>
    <button class="tool-btn t-exit"  onclick="setMode('exit')"  id="btn-exit">🎯 EXIT</button>
    <button class="tool-btn t-zombie" onclick="setMode('zombie')" id="btn-zombie">🧟 ZOMBIE</button>
    <button class="tool-btn t-wall"  onclick="setMode('wall')"  id="btn-wall">⬛ WALL</button>
    <button class="tool-btn t-clear" onclick="setMode('clear')" id="btn-clear">❌ ERASE</button>
  </div>

  <div class="actions">
    <button class="action-btn bfs-btn"  onclick="runBFS()">⚡ BFS SEARCH</button>
    <button class="action-btn astar-btn" onclick="runAStar()">⭐ A* OPTIMAL</button>
    <button class="action-btn reset-btn" onclick="resetGrid()">☠ RESET MAP</button>
  </div>

  <div class="grid-wrap">
    <div class="grid-corner tl"></div>
    <div class="grid-corner tr"></div>
    <div class="grid-corner bl"></div>
    <div class="grid-corner br"></div>
    <div id="grid" class="grid"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div>Survivor</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00ffe1"></div>Exit</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff2020"></div>Zombie</div>
    <div class="legend-item"><div class="legend-dot" style="background:#222"></div>Wall</div>
    <div class="legend-item"><div class="legend-dot" style="background:#39ff14"></div>Path</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>Walker</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ─────────────────────────────
const ROWS = 10, COLS = 10;
// 0=empty, 1=wall, 4=zombie
let grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
let start = [0,0], exit = [9,9];
let mode = 'wall';
let animRunning = false;
let currentPath = [];

// ─── PARTICLE SYSTEM ────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticle(){
  particles.push({
    x: Math.random() * canvas.width,
    y: canvas.height + 10,
    vx: (Math.random()-0.5) * 0.4,
    vy: -(Math.random()*0.6+0.2),
    size: Math.random()*2+0.5,
    alpha: Math.random()*0.4+0.1,
    color: Math.random() > 0.6 ? '#ff2020' : Math.random() > 0.5 ? '#39ff14' : '#ffffff',
  });
}

function animParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(particles.length < 60 && Math.random()<0.3) spawnParticle();
  particles = particles.filter(p=>p.y > -10 && p.alpha > 0.02);
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.alpha *= 0.998;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animParticles);
}
animParticles();

// ─── MODE ───────────────────────────────
function setMode(m){
  mode = m;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m)?.classList.add('active');
}
setMode('wall');

// ─── GRID DRAW ───────────────────────────
let isDragging = false;

function drawGrid(path=[], currentPos=null){
  const container = document.getElementById('grid');
  container.innerHTML = '';

  for(let i=0;i<ROWS;i++){
    for(let j=0;j<COLS;j++){
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.i = i; div.dataset.j = j;

      const isCurrent = currentPos && currentPos[0]===i && currentPos[1]===j;
      const isPath = path.some(p=>p[0]===i&&p[1]===j);
      const isStart = i===start[0]&&j===start[1];
      const isExit  = i===exit[0] &&j===exit[1];

      let emoji = '';

      if(isStart)        { div.classList.add('start'); emoji='🧍'; }
      else if(isExit)    { div.classList.add('exit');  emoji='🎯'; }
      else if(isCurrent) { div.classList.add('current'); emoji='🚶'; }
      else if(isPath)    { div.classList.add('path'); emoji='·'; }
      else if(grid[i][j]===1){ div.classList.add('wall'); }
      else if(grid[i][j]===4){ div.classList.add('zombie'); emoji='🧟'; }
      else               { div.classList.add('empty'); }

      div.textContent = emoji;

      div.addEventListener('mousedown', e=>{ isDragging=true; handleCell(i,j); e.preventDefault(); });
      div.addEventListener('mouseenter', ()=>{ if(isDragging) handleCell(i,j); });
      div.addEventListener('touchstart', e=>{ handleCell(i,j); e.preventDefault(); }, {passive:false});
      div.addEventListener('touchmove', e=>{
        const t = e.touches[0];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if(el && el.dataset.i !== undefined) handleCell(+el.dataset.i, +el.dataset.j);
        e.preventDefault();
      }, {passive:false});

      container.appendChild(div);
    }
  }
  updateStats(path.length);
}

document.addEventListener('mouseup', ()=>isDragging=false);

function handleCell(i,j){
  if(animRunning) return;
  const wasStart = i===start[0]&&j===start[1];
  const wasExit  = i===exit[0] &&j===exit[1];

  if(mode==='start') { start=[i,j]; }
  else if(mode==='exit')  { exit=[i,j]; }
  else if(mode==='wall')  { if(!wasStart&&!wasExit) grid[i][j]= grid[i][j]===1?0:1; }
  else if(mode==='zombie'){ if(!wasStart&&!wasExit) grid[i][j]= grid[i][j]===4?0:4; }
  else if(mode==='clear') { grid[i][j]=0; }

  currentPath=[];
  drawGrid();
}

// ─── STATS ──────────────────────────────
function updateStats(pathLen){
  let walls=0,zombies=0;
  for(let i=0;i<ROWS;i++) for(let j=0;j<COLS;j++){
    if(grid[i][j]===1) walls++;
    if(grid[i][j]===4) zombies++;
  }
  document.getElementById('stat-walls').textContent = walls;
  document.getElementById('stat-zombies').textContent = zombies;
  document.getElementById('stat-length').textContent = pathLen||'—';
}

// ─── BFS ────────────────────────────────
function bfs(){
  const queue = [[start,[]]];
  const visited = new Set();
  while(queue.length){
    const [[x,y],path] = queue.shift();
    if(x===exit[0]&&y===exit[1]) return [...path,[x,y]];
    const key=x+','+y;
    if(visited.has(key)) continue;
    visited.add(key);
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx, ny=y+dy;
      if(nx>=0&&ny>=0&&nx<ROWS&&ny<COLS&&grid[nx][ny]!==1&&grid[nx][ny]!==4)
        queue.push([[nx,ny],[...path,[x,y]]]);
    }
  }
  return [];
}

// ─── A* ─────────────────────────────────
function heuristic(a,b){ return Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1]); }

function astar(){
  let pq = [[0,start,[]]];
  const visited = new Set();
  while(pq.length){
    pq.sort((a,b)=>a[0]-b[0]);
    const [,[x,y],path] = pq.shift();
    if(x===exit[0]&&y===exit[1]) return [...path,[x,y]];
    const key=x+','+y;
    if(visited.has(key)) continue;
    visited.add(key);
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx, ny=y+dy;
      if(nx>=0&&ny>=0&&nx<ROWS&&ny<COLS&&grid[nx][ny]!==1&&grid[nx][ny]!==4){
        const g = path.length+1;
        const f = g + heuristic([nx,ny],exit);
        pq.push([f,[nx,ny],[...path,[x,y]]]);
      }
    }
  }
  return [];
}

// ─── ANIMATION ──────────────────────────
async function animate(path, algoName){
  if(animRunning) return;
  animRunning = true;

  document.getElementById('stat-algo').textContent = algoName;
  document.getElementById('stat-status').textContent = 'RUNNING';
  document.getElementById('stat-status').parentElement.querySelector('.status-value').className = 'status-value info';

  if(!path.length){
    drawGrid([]);
    // Flash all cells red briefly
    document.querySelectorAll('.cell.empty, .cell.path').forEach(c=>c.classList.add('no-path'));
    showToast('☠ NO ESCAPE ROUTE FOUND', 'error');
    document.getElementById('stat-status').textContent = 'BLOCKED';
    document.getElementById('stat-status').parentElement.querySelector('.status-value').className = 'status-value danger';
    animRunning = false;
    return;
  }

  for(let idx=0;idx<path.length;idx++){
    const step = path[idx];
    const trail = path.slice(0,idx);
    drawGrid(trail, step);
    await sleep(90);
  }

  // Final full path glow reveal
  drawGrid(path);
  showToast(`✅ PATH FOUND — ${path.length} STEPS`, 'success');
  document.getElementById('stat-status').textContent = 'CLEAR';
  document.getElementById('stat-length').textContent = path.length;
  animRunning = false;
  currentPath = path;
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));

function runBFS(){
  if(animRunning) return;
  animate(bfs(), 'BFS');
}
function runAStar(){
  if(animRunning) return;
  animate(astar(), 'A*');
}

// ─── RESET ──────────────────────────────
function resetGrid(){
  if(animRunning) return;
  grid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
  start=[0,0]; exit=[9,9]; currentPath=[];
  document.getElementById('stat-algo').textContent='—';
  document.getElementById('stat-status').textContent='READY';
  document.getElementById('stat-status').parentElement.querySelector('.status-value').className='status-value';
  drawGrid();
  showToast('MAP CLEARED', 'info');
}

// ─── TOAST ──────────────────────────────
let toastTimer;
function showToast(msg, type='info'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ─── INIT ───────────────────────────────
drawGrid();

// Spawn blood particles on zombie cell hover
document.getElementById('grid').addEventListener('mouseover', e=>{
  if(e.target.classList.contains('zombie')){
    const rect = e.target.getBoundingClientRect();
    for(let k=0;k<5;k++) particles.push({
      x: rect.left + rect.width/2 + (Math.random()-0.5)*10,
      y: rect.top + rect.height/2,
      vx: (Math.random()-0.5)*1.5,
      vy: -(Math.random()*1.5+0.5),
      size: Math.random()*2+1,
      alpha: 0.8,
      color: '#ff2020',
    });
  }
});
</script>
